# =============================================================================
# NGINX.CONF — TechMarket Perú S.A.C.
# Configuración de producción optimizada para SPA Angular 18
# Características: SPA routing, GZIP, cache control, headers de seguridad
# =============================================================================

# Número de procesos worker. "auto" detecta automáticamente los CPU cores
# disponibles en el contenedor para maximizar el throughput.
worker_processes auto;

# Configuración del archivo PID del proceso master de Nginx.
pid /var/run/nginx.pid;

# Número máximo de conexiones simultáneas por worker process.
# 1024 es un valor conservador-seguro para contenedores con recursos limitados.
events {
    worker_connections 1024;
    # multi_accept on: el worker acepta múltiples conexiones por ciclo de evento.
    multi_accept on;
}

http {
    # ── Tipos MIME ────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── SEGURIDAD: Ocultar versión de Nginx ───────────────────────────────────
    # Previene que atacantes identifiquen la versión exacta del servidor
    # y exploten vulnerabilidades conocidas de versiones específicas.
    server_tokens off;

    # ── PERFORMANCE: Optimizaciones de I/O ───────────────────────────────────
    # sendfile: transfiere archivos directamente en el kernel (zero-copy), más rápido.
    sendfile        on;
    # tcp_nopush: envía la cabecera HTTP junto con el inicio del archivo en un paquete.
    tcp_nopush      on;
    # tcp_nodelay: desactiva el algoritmo Nagle para reducir latencia en conexiones keep-alive.
    tcp_nodelay     on;
    # keepalive_timeout: tiempo en segundos que se mantiene una conexión TCP abierta.
    keepalive_timeout 65;

    # ── COMPRESIÓN GZIP ───────────────────────────────────────────────────────
    # Activa la compresión GZIP para reducir el tamaño de los assets transmitidos.
    # Ahorro típico: 60-80% en archivos JS/CSS, acelerando el First Contentful Paint.
    gzip on;
    # gzip_disable: desactiva GZIP para MSIE6 (bug conocido en ese navegador antiguo).
    gzip_disable "msie6";
    # gzip_vary: añade la cabecera "Vary: Accept-Encoding" para que CDNs/proxies
    # almacenen correctamente versiones comprimidas y sin comprimir.
    gzip_vary on;
    # gzip_proxied: comprime respuestas para solicitudes que pasen por un proxy.
    gzip_proxied any;
    # gzip_comp_level: nivel de compresión (1=rápido/menos compresión, 9=lento/más compresión).
    # Nivel 6 es el punto óptimo entre CPU y ahorro de ancho de banda.
    gzip_comp_level 6;
    # gzip_buffers: número y tamaño de buffers para comprimir una respuesta.
    gzip_buffers 16 8k;
    # gzip_http_version: versión mínima de HTTP para activar GZIP.
    gzip_http_version 1.1;
    # gzip_min_length: tamaño mínimo del archivo para aplicar GZIP (no comprimir archivos pequeños).
    gzip_min_length 256;
    # gzip_types: tipos MIME que se comprimen. Incluye todos los assets relevantes de una SPA.
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ── FORMATO DE LOGS ───────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── VIRTUAL HOST: SPA TechMarket ─────────────────────────────────────────
    server {
        # Puerto de escucha HTTP estándar.
        listen 80;
        listen [::]:80;

        # Nombre del servidor. Acepta cualquier hostname (adecuado para contenedor).
        server_name _;

        # Directorio raíz donde están los artefactos compilados de Angular.
        root /usr/share/nginx/html;

        # Archivo de índice por defecto.
        index index.html;

        # Charset por defecto para todas las respuestas de texto.
        charset utf-8;

        # ── CABECERAS DE SEGURIDAD ─────────────────────────────────────────
        # X-Frame-Options: previene que la app sea embebida en iframes (Clickjacking).
        add_header X-Frame-Options "SAMEORIGIN" always;
        # X-Content-Type-Options: previene MIME-sniffing attacks (el navegador respeta el Content-Type).
        add_header X-Content-Type-Options "nosniff" always;
        # X-XSS-Protection: activa el filtro XSS de navegadores legacy.
        add_header X-XSS-Protection "1; mode=block" always;
        # Referrer-Policy: controla la información del referer enviada en requests.
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Permissions-Policy: restringe el acceso a APIs del navegador (cámara, micrófono, etc.)
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── RUTA PRINCIPAL: SPA FALLBACK ───────────────────────────────────
        # CRÍTICO para SPA: sin este bloque, recargar la página en rutas como
        # /catalog devuelve 404 porque Nginx busca un archivo físico /catalog/index.html
        # que no existe. try_files resuelve esto sirviendo siempre index.html.
        location / {
            # 1. Intenta servir el archivo exacto ($uri)
            # 2. Intenta servir como directorio ($uri/)
            # 3. Fallback: sirve index.html (el router de Angular toma el control)
            try_files $uri $uri/ /index.html;
        }

        # ── CACHÉ AGRESIVO PARA ASSETS CON HASH ───────────────────────────
        # Angular genera bundles con hash en el nombre (ej: main.a3f2d1.js).
        # Estos archivos son inmutables: si el contenido cambia, cambia el nombre.
        # Por eso podemos cachearlos indefinidamente (1 año) de forma segura.
        location ~* \.(js|css|woff|woff2|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            # Desactiva logs de acceso para assets estáticos (reduce I/O de disco).
            access_log off;
        }

        # ── NO CACHE PARA index.html ───────────────────────────────────────
        # El index.html no tiene hash en el nombre, por lo que NUNCA debe
        # cachearse. Si se cachea, el usuario no verá los bundles nuevos tras
        # un deployment (aunque los JS/CSS sí cambien de nombre).
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # ── MANEJO DE ERRORES PERSONALIZADOS ──────────────────────────────
        # Redirige errores 404 y 50x al index.html para que Angular los maneje.
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }

        # ── HEALTH CHECK ENDPOINT ─────────────────────────────────────────
        # Endpoint ligero para health checks de orquestadores (K8s, ECS, etc.)
        # sin necesidad de acceder a archivos de la SPA.
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
