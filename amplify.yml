version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
        - echo "=== CONTENIDO DIST ===" 
        - ls -la dist/
        - ls -la dist/techmarket-frontend/
  artifacts:
    baseDirectory: dist/techmarket-frontend
    files:
      - '*/'
  cache:
    paths:
      - node_modules/*/